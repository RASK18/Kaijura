name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Kaijura.slnx

      - name: Test
        run: dotnet test Kaijura.slnx --configuration Release --no-restore

      - name: Publish
        run: dotnet publish Kaijura.App/Kaijura.App.csproj --configuration Release --runtime win-x64 --self-contained true --output publish /p:PublishSingleFile=false

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Package and upload
        shell: pwsh
        run: |
          dotnet tool install --global vpk --version 0.0.1298
          try {
            vpk download github --repoUrl "https://github.com/${{ github.repository }}" --token "${{ secrets.GITHUB_TOKEN }}"
          } catch {
            Write-Host "No previous Velopack release found."
          }
          vpk pack --packId Kaijura --packVersion "${{ steps.version.outputs.value }}" --packDir publish --mainExe Kaijura.exe
          vpk upload github --repoUrl "https://github.com/${{ github.repository }}" --token "${{ secrets.GITHUB_TOKEN }}" --publish --releaseName "Kaijura ${{ steps.version.outputs.value }}" --tag "${{ github.ref_name }}"
