<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:;">
  <title>Kaijura</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <main class="main">
      <header class="topbar">
        <p id="statusMessage"></p>
      </header>

      <section id="updateBanner" class="update-banner hidden">
        <span id="updateText"></span>
        <button id="installUpdateButton" class="button compact" type="button">Instalar</button>
      </section>

      <section id="boardView" class="view">
        <div class="lane" data-kind="task">
          <div class="lane-title section-header">
            <span>Kanban Tareas</span>
            <span id="taskBoardCount" class="section-count">0</span>
          </div>
          <div id="taskBoard" class="kanban-grid"></div>
        </div>

        <div class="lane" data-kind="incident">
          <div class="lane-title section-header">
            <span>Kanban Incidencias</span>
            <span id="incidentBoardCount" class="section-count">0</span>
          </div>
          <div id="incidentBoard" class="kanban-grid"></div>
        </div>

        <section class="backlog">
          <div class="backlog-grid">
            <div>
              <div class="list-title section-header">
                <span>Backlog Tareas</span>
                <span id="taskBacklogCount" class="section-count">0</span>
              </div>
              <div id="taskBacklog" class="drop-list" data-section="backlog" data-kind="task" data-column="ToDo"></div>
            </div>
            <div>
              <div class="list-title section-header">
                <span>Backlog Incidencias</span>
                <span id="incidentBacklogCount" class="section-count">0</span>
              </div>
              <div id="incidentBacklog" class="drop-list" data-section="backlog" data-kind="incident" data-column="ToDo"></div>
            </div>
          </div>
          <div id="unmappedBlock" class="unmapped-block hidden">
            <div class="list-title section-header">
              <span>Sin mapear</span>
              <span id="unmappedCount" class="section-count">0</span>
            </div>
            <div id="unmappedList" class="plain-list"></div>
          </div>
        </section>
      </section>

      <section id="archiveView" class="view hidden">
        <div class="section-title">Tickets archivados</div>
        <div class="archive-grid">
          <div>
            <div class="list-title">Tareas</div>
            <div id="taskArchiveList" class="plain-list"></div>
          </div>
          <div>
            <div class="list-title">Incidencias</div>
            <div id="incidentArchiveList" class="plain-list"></div>
          </div>
        </div>
        <div id="archiveUnmappedBlock" class="unmapped-block hidden">
          <div class="list-title">Sin mapear</div>
          <div id="archiveUnmappedList" class="plain-list"></div>
        </div>
      </section>

      <section id="missingView" class="view hidden">
        <div class="section-title">Tickets perdidos que ya no devuelve JQL</div>
        <div class="missing-grid">
          <div>
            <div class="list-title">Tareas</div>
            <div id="taskMissingList" class="plain-list"></div>
          </div>
          <div>
            <div class="list-title">Incidencias</div>
            <div id="incidentMissingList" class="plain-list"></div>
          </div>
        </div>
        <div id="missingUnmappedBlock" class="unmapped-block hidden">
          <div class="list-title">Sin mapear</div>
          <div id="missingUnmappedList" class="plain-list"></div>
        </div>
      </section>

      <section id="settingsView" class="view hidden">
        <form id="settingsForm" class="settings-form">
          <div class="form-grid">
            <label>
              Host Jira
              <input id="jiraHost" name="jiraHost" autocomplete="off" placeholder="https://jira.empresa.local">
            </label>
            <label>
              Usuario
              <input id="userName" name="userName" autocomplete="username">
            </label>
            <label>
              Token personal
              <input id="token" name="token" type="password" autocomplete="off">
            </label>
            <label>
              Refresco automatico (min)
              <input id="refreshMinutes" name="refreshMinutes" type="number" min="1" max="120">
            </label>
          </div>

          <label>
            JQL
            <textarea id="jql" name="jql" rows="5"></textarea>
          </label>

          <div class="form-grid">
            <label>
              Issue types de tareas
              <input id="taskIssueTypes" name="taskIssueTypes" placeholder="Task, Story, Tarea">
            </label>
            <label>
              Issue types de incidencias
              <input id="incidentIssueTypes" name="incidentIssueTypes" placeholder="Bug, Incident, Incidencia">
            </label>
            <label>
              Autores de comentarios ignorados
              <input id="ignoredCommentAuthors" name="ignoredCommentAuthors" placeholder="bot-jira, CI Bot">
            </label>
            <label>
              Maximo de tickets
              <input id="maxIssues" name="maxIssues" type="number" min="1" max="5000">
            </label>
            <label>
              GitHub Releases
              <input id="updateRepositoryUrl" name="updateRepositoryUrl" autocomplete="off">
            </label>
          </div>

          <div class="form-actions">
            <button class="button primary" type="submit">Guardar y conectar</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
